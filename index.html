<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transparent Overlay Aggregator</title>
  <!--
    ╔══════════════════════════════════════════════════╗
    ║   TRANSPARENT OVERLAY AGGREGATOR v1.0            ║
    ║   OBS Browser Source – Transparent Canvas        ║
    ║                                                  ║
    ║   Cara pakai:                                    ║
    ║   1. Edit config.js → isi link overlay Anda      ║
    ║   2. Buka file ini di OBS Browser Source         ║
    ║   3. Set ukuran sesuai resolusi streaming Anda   ║
    ╚══════════════════════════════════════════════════╝
  -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Canvas utama – semua iframe overlay dimuat di sini -->
  <div id="overlay-canvas"></div>
<!-- ====== AUTO UNLOCK AUDIO ====== -->
<script>
  (function autoUnlockAudio() {
    // Tunggu 2 detik sampai semua iframe termuat
    setTimeout(function() {
      var iframes = document.querySelectorAll('iframe');
      if (iframes.length === 0) return;

      // Cara 1: Coba reload iframe dengan parameter autoplay (jika didukung)
      iframes.forEach(function(iframe) {
        try {
          var src = iframe.src;
          if (src && !src.includes('autoplay=1')) {
            var separator = src.includes('?') ? '&' : '?';
            iframe.src = src + separator + 'autoplay=1&mute=0';
          }
        } catch(e) {}
      });

      // Cara 2: Kirim pesan ke iframe untuk minta izin suara (jika iframe mendengar)
      setTimeout(function() {
        iframes.forEach(function(iframe) {
          try {
            iframe.contentWindow.postMessage({ type: 'UNLOCK_AUDIO', command: 'play' }, '*');
          } catch(e) {}
        });
      }, 500);

      // Cara 3: OBS-specific - Trigger event klik virtual ke body
      var evt = new MouseEvent('click', { bubbles: true, cancelable: true });
      document.body.dispatchEvent(evt);
      
      console.log('[OA] 🔓 Auto-unlock audio telah dicoba. Jika masih tidak bersuara, aktifkan "Control audio via OBS" di Properties.');
    }, 2000);
  })();
</script>
  <!-- Load konfigurasi dulu, baru engine -->
  <script src="config.js"></script>
  <script src="overlay.js"></script>

</body>
</html>
