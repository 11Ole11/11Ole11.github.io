<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Transparent Overlay Aggregator • Minimal</title>
  <style>
    :root {
      --accent: #38bdf8;
      --danger: #f87171;
      --warning: #fbbf24;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent !important;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #overlay-canvas {
      position: absolute;
      inset: 0;
      background: transparent;
      z-index: 1;
    }

    /* Overlay item */
    .overlay-item {
      position: absolute;
      min-width: 40px;
      min-height: 40px;
      cursor: default;
      z-index: 10;
      background: transparent;
      transition: outline 0.1s;
    }

    .overlay-item.edit-mode {
      outline: 1px dashed rgba(255, 255, 255, 0.4);
      outline-offset: 0px;
    }

    .overlay-item.edit-mode:hover {
      outline: 2px dashed rgba(255, 255, 255, 0.8);
    }

    .drag-shield {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      background: transparent;
      cursor: move;
      touch-action: none;
    }

    body.display-mode .drag-shield {
      display: none !important;
    }

    .overlay-content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      z-index: 5;
      pointer-events: none;
    }

    body.display-mode .overlay-content {
      pointer-events: auto;
    }

    .overlay-content iframe,
    .overlay-content video,
    .overlay-content img {
      display: block;
      border: none;
      background: transparent;
      pointer-events: auto;
    }

    .overlay-content img,
    .overlay-content video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Label kecil */
    .overlay-label {
      position: absolute;
      top: -22px;
      left: 0;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
      z-index: 30;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .overlay-item.edit-mode:hover .overlay-label,
    .overlay-item.dragging .overlay-label,
    .overlay-item.resizing .overlay-label {
      opacity: 1;
    }

    /* Resize handles */
    .resize-handle {
      position: absolute;
      z-index: 35;
      background: var(--accent);
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: auto;
    }

    .overlay-item.edit-mode:hover .resize-handle,
    .overlay-item.dragging .resize-handle,
    .overlay-item.resizing .resize-handle {
      opacity: 1;
    }

    .resize-handle.nw, .resize-handle.ne, .resize-handle.sw, .resize-handle.se {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }

    .resize-handle.nw { top: -7px; left: -7px; cursor: nwse-resize; }
    .resize-handle.ne { top: -7px; right: -7px; cursor: nesw-resize; }
    .resize-handle.sw { bottom: -7px; left: -7px; cursor: nesw-resize; }
    .resize-handle.se { bottom: -7px; right: -7px; cursor: nwse-resize; }
    .resize-handle.n { top: -7px; left: 50%; transform: translateX(-50%); width: 28px; height: 8px; border-radius: 4px; cursor: ns-resize; }
    .resize-handle.s { bottom: -7px; left: 50%; transform: translateX(-50%); width: 28px; height: 8px; border-radius: 4px; cursor: ns-resize; }
    .resize-handle.e { top: 50%; right: -7px; transform: translateY(-50%); width: 8px; height: 28px; border-radius: 4px; cursor: ew-resize; }
    .resize-handle.w { top: 50%; left: -7px; transform: translateY(-50%); width: 8px; height: 28px; border-radius: 4px; cursor: ew-resize; }

    /* Tombol aksi kecil */
    .overlay-actions {
      position: absolute;
      top: 4px;
      right: 4px;
      display: flex;
      gap: 3px;
      z-index: 40;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .overlay-item.edit-mode:hover .overlay-actions {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-actions button {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.6);
      cursor: pointer;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: rgba(20, 20, 30, 0.8);
      backdrop-filter: blur(4px);
      transition: all 0.15s;
    }

    .overlay-actions button:hover {
      background: rgba(0, 0, 0, 0.85);
      border-color: #fff;
    }

    .btn-mute.muted {
      background: rgba(220, 38, 38, 0.8);
    }

    /* Tombol simpan posisi mengambang */
    #save-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      transition: opacity 0.4s ease, transform 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 1;
      pointer-events: auto;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #save-button.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease 1.5s;
    }

    #save-button:hover {
      background: rgba(0, 0, 0, 0.85);
      border-color: rgba(255, 255, 255, 0.6);
      transform: scale(1.04);
    }

    body.display-mode .overlay-item {
      outline: none !important;
    }

    body.display-mode .drag-shield,
    body.display-mode .resize-handle,
    body.display-mode .overlay-actions,
    body.display-mode .overlay-label {
      display: none !important;
    }

    body.display-mode #save-button {
      opacity: 0;
      pointer-events: none;
    }

    #mode-indicator {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      z-index: 9998;
      pointer-events: none;
    }
  </style>
</head>
<body class="edit-mode">

  <div id="overlay-canvas"></div>

  <button id="save-button" title="Simpan posisi dan ukuran semua overlay">💾 Simpan Posisi</button>
  <div id="mode-indicator">Mode Edit • Klik simpan untuk menyimpan layout</div>

  <script>
    (function () {
      // ================== HARDCODE LINK OVERLAY DI SINI ==================
      // Isi URL sesuai kebutuhan. Atur "active: true" untuk menampilkan overlay.
      // Jika "active: false" atau properti tidak ada, overlay tidak akan muncul.
      const presetOverlays = [
        // --- 10 Sociabuzz Alert ---
        { type: 'iframe', url: 'https://sociabuzz.com/pro/tribe/alert1/v3/7264966058?colorName=%2300ff00&alphaName=1&colorNote=%23ffff00&alphaNote=1&colorFrom=%23eeeeee&alphaFrom=1&gifActive=1&maxDuration=25&font=Open%2BSans%3A800', label: 'Sociabuzz Alert 1', active: true },
        { type: 'iframe', url: 'https://sociabuzz.com/pro/tribe/total1/v1/7264966058', label: 'Sociabuzz Alert 2', active: true },
        { type: 'iframe', url: 'https://sociabuzz.com/pro/tribe/topleaderboard/v2/7264966058', label: 'Sociabuzz Alert 3', active: true },
        { type: 'iframe', url: 'https://sociabuzz.com/pro/tribe/total/v2/7264966058', label: 'Sociabuzz Alert 4', active: true },
        { type: 'iframe', url: '', label: 'Sociabuzz Alert 5 (nonaktif)', active: false },  // kosong & nonaktif
        { type: 'iframe', url: '', label: 'Sociabuzz Alert 6 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'Sociabuzz Alert 7 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'Sociabuzz Alert 8 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'Sociabuzz Alert 9 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'Sociabuzz Alert 10 (nonaktif)', active: false },
        // --- 10 TikFinity Alert ---
        { type: 'iframe', url: 'https://tikfinity.zerody.one/widget/myactions?cid=3456048&screen=2', label: 'TikFinity Alert 1', active: true },
        { type: 'iframe', url: '', label: 'TikFinity Alert 2 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'TikFinity Alert 3 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'TikFinity Alert 4 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'TikFinity Alert 5 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'TikFinity Alert 6 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'TikFinity Alert 7 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'TikFinity Alert 8 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'TikFinity Alert 9 (nonaktif)', active: false },
        { type: 'iframe', url: '', label: 'TikFinity Alert 10 (nonaktif)', active: false },
      ];

      // ================== VARIABEL UTAMA ==================
      const canvas = document.getElementById('overlay-canvas');
      const saveButton = document.getElementById('save-button');
      const modeIndicator = document.getElementById('mode-indicator');
      const STORAGE_KEY = 'overlay_agg_minimal_positions';
      let overlays = [];   // hanya yang aktif & sudah dirender
      let currentId = 0;
      let isDisplayMode = false;

      // ================== FUNGSI BANTU ==================
      function generateId() {
        return 'ov_' + Date.now() + '_' + (++currentId);
      }

      function applyIframeScale(item, overlayData) {
        if (overlayData.type !== 'iframe') return;
        const iframe = item.querySelector('iframe');
        if (!iframe) return;
        const origW = overlayData.originalWidth || overlayData.width;
        const origH = overlayData.originalHeight || overlayData.height;
        const scaleX = overlayData.width / origW;
        const scaleY = overlayData.height / origH;
        iframe.style.transform = `scale(${scaleX}, ${scaleY})`;
        iframe.style.transformOrigin = '0 0';
        iframe.style.width = origW + 'px';
        iframe.style.height = origH + 'px';
        iframe.style.position = 'absolute';
        iframe.style.top = '0';
        iframe.style.left = '0';
      }

      function createOverlayElement(overlayData) {
        const item = document.createElement('div');
        item.className = 'overlay-item edit-mode';
        item.dataset.id = overlayData.id;
        item.style.left = overlayData.x + 'px';
        item.style.top = overlayData.y + 'px';
        item.style.width = overlayData.width + 'px';
        item.style.height = overlayData.height + 'px';
        item.style.zIndex = overlayData.zIndex;

        const label = document.createElement('div');
        label.className = 'overlay-label';
        label.textContent = overlayData.label || 'Overlay';
        item.appendChild(label);

        const content = document.createElement('div');
        content.className = 'overlay-content';
        if (overlayData.type === 'iframe') {
          const iframe = document.createElement('iframe');
          iframe.src = overlayData.url;
          iframe.allow = 'autoplay; camera; microphone; fullscreen';
          iframe.title = overlayData.label;
          content.appendChild(iframe);
        } else if (overlayData.type === 'image') {
          const img = document.createElement('img');
          img.src = overlayData.url;
          img.alt = overlayData.label;
          img.draggable = false;
          content.appendChild(img);
        } else if (overlayData.type === 'video') {
          const video = document.createElement('video');
          video.src = overlayData.url;
          video.autoplay = true;
          video.loop = true;
          video.muted = overlayData.muted !== undefined ? overlayData.muted : true;
          video.playsInline = true;
          content.appendChild(video);
          video.play().catch(() => {});
        }
        item.appendChild(content);

        // Drag shield
        const shield = document.createElement('div');
        shield.className = 'drag-shield';
        shield.addEventListener('mousedown', onDragStart);
        shield.addEventListener('touchstart', onDragStart, { passive: false });
        item.appendChild(shield);

        // Resize handles
        ['nw', 'n', 'ne', 'e', 'se', 's', 'sw', 'w'].forEach(dir => {
          const h = document.createElement('div');
          h.className = 'resize-handle ' + dir;
          h.dataset.direction = dir;
          h.addEventListener('mousedown', onResizeStart);
          h.addEventListener('touchstart', onResizeStart, { passive: false });
          item.appendChild(h);
        });

        // Tombol aksi
        const actions = document.createElement('div');
        actions.className = 'overlay-actions';
        actions.innerHTML = `
          <button class="btn-front" title="Ke depan">⬆</button>
          <button class="btn-back" title="Ke belakang">⬇</button>
          ${overlayData.type === 'video' ? `<button class="btn-mute ${overlayData.muted ? 'muted' : ''}" title="Mute">🔊</button>` : ''}
        `;
        actions.querySelector('.btn-front')?.addEventListener('click', (e) => { e.stopPropagation(); bringToFront(overlayData.id); });
        actions.querySelector('.btn-back')?.addEventListener('click', (e) => { e.stopPropagation(); sendToBack(overlayData.id); });
        if (overlayData.type === 'video') {
          actions.querySelector('.btn-mute').addEventListener('click', (e) => { e.stopPropagation(); toggleMute(overlayData.id); });
        }
        item.appendChild(actions);

        if (overlayData.type === 'iframe') {
          requestAnimationFrame(() => applyIframeScale(item, overlayData));
        }

        canvas.appendChild(item);
        return item;
      }

      // ================== DRAG & RESIZE ==================
      let dragState = null;
      function onDragStart(e) {
        if (isDisplayMode) return;
        e.preventDefault();
        const item = e.target.closest('.overlay-item');
        if (!item) return;
        const ov = overlays.find(o => o.id === item.dataset.id);
        if (!ov) return;
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        dragState = { overlayId: ov.id, item, startX: cx, startY: cy, origLeft: ov.x, origTop: ov.y };
        item.classList.add('dragging');
        bringToFront(ov.id);
        window.addEventListener('mousemove', onDragMove);
        window.addEventListener('mouseup', onDragEnd);
        window.addEventListener('touchmove', onDragMove, { passive: false });
        window.addEventListener('touchend', onDragEnd);
      }

      function onDragMove(e) {
        if (!dragState) return;
        e.preventDefault();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const dx = cx - dragState.startX, dy = cy - dragState.startY;
        const newLeft = Math.max(-60, dragState.origLeft + dx);
        const newTop = Math.max(-60, dragState.origTop + dy);
        dragState.item.style.left = newLeft + 'px';
        dragState.item.style.top = newTop + 'px';
        const ov = overlays.find(o => o.id === dragState.overlayId);
        if (ov) { ov.x = newLeft; ov.y = newTop; }
      }

      function onDragEnd() {
        if (!dragState) return;
        dragState.item.classList.remove('dragging');
        dragState = null;
        window.removeEventListener('mousemove', onDragMove);
        window.removeEventListener('mouseup', onDragEnd);
        window.removeEventListener('touchmove', onDragMove);
        window.removeEventListener('touchend', onDragEnd);
        showSaveButton();
      }

      let resizeState = null;
      function onResizeStart(e) {
        if (isDisplayMode) return;
        e.preventDefault();
        e.stopPropagation();
        const handle = e.target.closest('.resize-handle');
        const item = e.target.closest('.overlay-item');
        if (!handle || !item) return;
        const ov = overlays.find(o => o.id === item.dataset.id);
        if (!ov) return;
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        resizeState = {
          overlayId: ov.id, item, direction: handle.dataset.direction,
          startX: cx, startY: cy, origLeft: ov.x, origTop: ov.y,
          origWidth: ov.width, origHeight: ov.height
        };
        item.classList.add('resizing');
        window.addEventListener('mousemove', onResizeMove);
        window.addEventListener('mouseup', onResizeEnd);
        window.addEventListener('touchmove', onResizeMove, { passive: false });
        window.addEventListener('touchend', onResizeEnd);
      }

      function onResizeMove(e) {
        if (!resizeState) return;
        e.preventDefault();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const dx = cx - resizeState.startX, dy = cy - resizeState.startY;
        const dir = resizeState.direction;
        let newLeft = resizeState.origLeft, newTop = resizeState.origTop;
        let newWidth = resizeState.origWidth, newHeight = resizeState.origHeight;

        if (dir.includes('e')) newWidth = Math.max(50, resizeState.origWidth + dx);
        if (dir.includes('w')) { newWidth = Math.max(50, resizeState.origWidth - dx); newLeft = resizeState.origLeft + (resizeState.origWidth - newWidth); }
        if (dir.includes('s')) newHeight = Math.max(50, resizeState.origHeight + dy);
        if (dir.includes('n')) { newHeight = Math.max(50, resizeState.origHeight - dy); newTop = resizeState.origTop + (resizeState.origHeight - newHeight); }

        resizeState.item.style.left = newLeft + 'px';
        resizeState.item.style.top = newTop + 'px';
        resizeState.item.style.width = newWidth + 'px';
        resizeState.item.style.height = newHeight + 'px';

        const ov = overlays.find(o => o.id === resizeState.overlayId);
        if (ov) {
          ov.x = newLeft; ov.y = newTop; ov.width = newWidth; ov.height = newHeight;
          if (ov.type === 'iframe') applyIframeScale(resizeState.item, ov);
        }
      }

      function onResizeEnd() {
        if (!resizeState) return;
        resizeState.item.classList.remove('resizing');
        resizeState = null;
        window.removeEventListener('mousemove', onResizeMove);
        window.removeEventListener('mouseup', onResizeEnd);
        window.removeEventListener('touchmove', onResizeMove);
        window.removeEventListener('touchend', onResizeEnd);
        showSaveButton();
      }

      function bringToFront(id) {
        const ov = overlays.find(o => o.id === id);
        if (!ov) return;
        const maxZ = Math.max(...overlays.map(o => o.zIndex), 10);
        ov.zIndex = maxZ + 1;
        const item = canvas.querySelector(`[data-id="${id}"]`);
        if (item) item.style.zIndex = ov.zIndex;
      }

      function sendToBack(id) {
        const ov = overlays.find(o => o.id === id);
        if (!ov) return;
        const minZ = Math.min(...overlays.map(o => o.zIndex), 10);
        ov.zIndex = Math.max(1, minZ - 1);
        const item = canvas.querySelector(`[data-id="${id}"]`);
        if (item) item.style.zIndex = ov.zIndex;
      }

      function toggleMute(id) {
        const ov = overlays.find(o => o.id === id);
        if (!ov || ov.type !== 'video') return;
        ov.muted = !ov.muted;
        const item = canvas.querySelector(`[data-id="${id}"]`);
        if (item) {
          const video = item.querySelector('video');
          if (video) video.muted = ov.muted;
          const btn = item.querySelector('.btn-mute');
          if (btn) {
            btn.classList.toggle('muted', ov.muted);
            btn.textContent = ov.muted ? '🔇' : '🔊';
          }
        }
      }

      // ================== TOMBOL SIMPAN ==================
      let saveButtonTimeout;
      function showSaveButton() {
        saveButton.classList.remove('hidden');
        clearTimeout(saveButtonTimeout);
        saveButtonTimeout = setTimeout(() => {
          saveButton.classList.add('hidden');
        }, 3000);
      }

      function savePositions() {
        // Simpan hanya overlay yang saat ini aktif (ada di array overlays)
        const data = overlays.map(o => ({
          id: o.id, type: o.type, url: o.url,
          x: o.x, y: o.y, width: o.width, height: o.height,
          zIndex: o.zIndex, muted: o.muted, label: o.label,
          originalWidth: o.originalWidth, originalHeight: o.originalHeight
        }));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        saveButton.classList.add('hidden');
        clearTimeout(saveButtonTimeout);
        const originalText = saveButton.innerHTML;
        saveButton.innerHTML = '✅ Tersimpan!';
        saveButton.classList.remove('hidden');
        setTimeout(() => {
          saveButton.innerHTML = originalText;
          saveButton.classList.add('hidden');
        }, 1500);
      }

      saveButton.addEventListener('click', savePositions);

      // ================== INISIALISASI ==================
      function loadPositions() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : null;
        } catch (e) { return null; }
      }

      function initializeOverlays() {
        const savedPositions = loadPositions();
        const defaultWidth = 380;
        const defaultHeight = 280;

        // Buat map dari url+label (untuk cocokkan posisi tersimpan)
        const savedMap = new Map();
        if (savedPositions) {
          savedPositions.forEach(p => savedMap.set(p.url + '|' + p.label, p));
        }

        // Filter hanya overlay yang aktif (active === true)
        const activePresets = presetOverlays.filter(p => p.active === true);

        // Jika tidak ada yang aktif, hentikan
        if (activePresets.length === 0) return;

        activePresets.forEach((preset, index) => {
          const key = preset.url + '|' + preset.label;
          const saved = savedMap.get(key);
          // Offset posisi awal agar tidak bertumpuk
          const offsetX = (index % 4) * 25;
          const offsetY = Math.floor(index / 4) * 25;

          const overlayData = {
            id: generateId(),
            type: preset.type,
            url: preset.url,
            x: saved ? saved.x : 100 + offsetX,
            y: saved ? saved.y : 100 + offsetY,
            width: saved ? saved.width : defaultWidth,
            height: saved ? saved.height : defaultHeight,
            originalWidth: saved ? (saved.originalWidth || saved.width) : defaultWidth,
            originalHeight: saved ? (saved.originalHeight || saved.height) : defaultHeight,
            zIndex: saved ? saved.zIndex : 20 + index,
            muted: saved ? saved.muted : (preset.type === 'video' ? true : false),
            label: preset.label,
          };
          overlays.push(overlayData);
          createOverlayElement(overlayData);
        });
      }

      // Mode display toggle (tekan H)
      function toggleDisplayMode() {
        isDisplayMode = !isDisplayMode;
        if (isDisplayMode) {
          document.body.classList.add('display-mode');
          saveButton.classList.add('hidden');
          modeIndicator.textContent = 'Mode Display (OBS) • Tekan H untuk edit';
        } else {
          document.body.classList.remove('display-mode');
          modeIndicator.textContent = 'Mode Edit • Klik simpan untuk menyimpan layout';
        }
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') {
          if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
          e.preventDefault();
          toggleDisplayMode();
        }
      });

      // Mulai
      initializeOverlays();

      // Jika parameter ?display=1, langsung mode display
      if (new URLSearchParams(location.search).get('display') === '1') {
        toggleDisplayMode();
      } else {
        showSaveButton();
      }

      // Ekspos API global
      window.OverlayAggregator = {
        savePositions,
        toggleDisplayMode,
      };
    })();
  </script>
</body>
</html>
