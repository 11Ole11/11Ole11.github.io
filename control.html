<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎛️ Remote Control Overlay Aggregator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      color: #eee;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: #4ade80; font-size: 24px; margin-bottom: 6px; }
    .sub { color: #888; font-size: 14px; margin-bottom: 20px; }
    .card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      border-left: 4px solid #4ade80;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-header .name {
      font-weight: bold;
      color: #facc15;
      font-size: 15px;
    }
    .card-header .badge {
      background: #2a2a4a;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 10px;
      color: #aaa;
    }
    .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
    .row label { font-size: 11px; color: #aaa; min-width: 60px; }
    .row input, .row select {
      background: #0d0d1a;
      border: 1px solid #333;
      color: #fff;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      flex: 1;
      min-width: 60px;
    }
    .row input:focus, .row select:focus { outline: 2px solid #4ade80; border-color: transparent; }
    .btn {
      background: #3b82f6;
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: 0.2s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-danger { background: #ef4444; }
    .btn-success { background: #22c55e; }
    .btn-warning { background: #eab308; color: #000; }
    .btn-purple { background: #8b5cf6; }
    .btn-sm { padding: 3px 10px; font-size: 10px; }
    .actions {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px;
      background: #1a1a2e;
      border-radius: 12px;
      align-items: center;
    }
    .actions .url-box {
      flex: 1;
      background: #0d0d1a;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      color: #7dd3fc;
      word-break: break-all;
      min-width: 200px;
      border: 1px solid #333;
      font-family: monospace;
    }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
    .empty-state .big { font-size: 48px; margin-bottom: 10px; }
    .add-overlay-section {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 16px;
      border: 2px dashed #444;
    }
    .add-overlay-section .row { margin-bottom: 8px; }
    .add-overlay-section .row input { flex: 1; }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      color: #000;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: bold;
      display: none;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .toast.error { background: #ef4444; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎛️ Remote Control Overlay</h1>
    <div class="sub">Atur semua overlay dari sini. Setiap perubahan langsung di-encode ke URL. Copy URL → paste di OBS Browser Source.</div>

    <!-- Daftar Overlay -->
    <div id="overlay-list"></div>

    <!-- Tombol Tambah Overlay -->
    <div class="add-overlay-section">
      <div style="font-weight:bold;color:#4ade80;font-size:13px;margin-bottom:8px;">➕ Tambah Overlay Baru</div>
      <div class="row">
        <label>Nama</label>
        <input id="new-name" placeholder="Misal: Teks Donasi" value="Overlay Baru">
        <label>URL</label>
        <input id="new-url" placeholder="https://... (kosongkan jika teks)">
        <label>Teks</label>
        <input id="new-text" placeholder="Teks kustom (jika tidak pakai URL)">
        <button class="btn btn-success" onclick="addOverlay()">Tambah</button>
      </div>
      <div style="font-size:10px;color:#666;margin-top:4px;">Isi URL ATAU Teks (bisa keduanya). Teks akan tampil sebagai overlay teks murni.</div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <div style="font-weight:bold;color:#aaa;font-size:12px;">🔗 URL untuk OBS:</div>
      <div class="url-box" id="share-url">(belum ada data)</div>
      <div class="btn-group">
        <button class="btn btn-success" onclick="applyToDisplay()">📋 Copy URL</button>
        <button class="btn btn-purple" onclick="openInNewTab()">🔗 Buka di Tab Baru</button>
        <button class="btn btn-warning" onclick="resetAll()">🔄 Reset</button>
      </div>
    </div>

    <!-- Tombol apply ke display langsung (jika display di tab lain) -->
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn" onclick="sendToDisplayTab()" style="background:#ec4899;">📡 Kirim ke Display Tab (Broadcast)</button>
      <button class="btn" onclick="exportConfig()" style="background:#f59e0b;color:#000;">📥 Export JSON</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importConfig(event)">
      <button class="btn" onclick="document.getElementById('import-file').click()" style="background:#6366f1;">📤 Import JSON</button>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script>
    // ─── STATE ──────────────────────────────────────────────────
    let overlays = [];

    // ─── FUNGSI UTAMA ──────────────────────────────────────────
    function loadFromURL() {
      const params = new URLSearchParams(window.location.search);
      const data = params.get('data');
      if (data) {
        try {
          const decoded = atob(decodeURIComponent(data));
          const parsed = JSON.parse(decoded);
          if (Array.isArray(parsed)) {
            overlays = parsed;
            render();
            updateURL();
            return;
          }
        } catch(e) { console.warn('Gagal parse data dari URL', e); }
      }
      // Default: baca dari localStorage
      const saved = localStorage.getItem('oa_remote_overlays');
      if (saved) {
        try {
          overlays = JSON.parse(saved);
          render();
          updateURL();
          return;
        } catch(e) {}
      }
      // Fallback: contoh data
      overlays = [
        { name: 'Sociabuzz Alert', url: 'https://sociabuzz.com/pro/tribe/alert1/v3/7264966058?colorName=%2300ff00&alphaName=1&colorNote=%23ffff00&alphaNote=1&colorFrom=%23eeeeee&alphaFrom=1&gifActive=1&maxDuration=25&font=Open%2BSans%3A800', text: '', x: 0, y: 0, width: '100%', height: '100%', zIndex: 10, opacity: 1 },
        { name: 'Sociabuzz Top Leaderboard', url: 'https://sociabuzz.com/pro/tribe/topleaderboard/v2/7264966058', text: '', x: 0, y: 0, width: '100%', height: '100%', zIndex: 12, opacity: 1 },
        { name: 'Sociabuzz Subathon', url: 'https://sociabuzz.com/pro/tribe/timer/v2/7264966058', text: '', x: 0, y: 600, width: '100%', height: '100%', zIndex: 13, opacity: 1 },
      ];
      render();
      updateURL();
    }

    function render() {
      const container = document.getElementById('overlay-list');
      if (!overlays.length) {
        container.innerHTML = `<div class="empty-state"><div class="big">📭</div><div>Belum ada overlay. Tambahkan di bawah!</div></div>`;
        return;
      }
      let html = '';
      overlays.forEach((o, idx) => {
        html += `
          <div class="card" data-idx="${idx}">
            <div class="card-header">
              <span class="name">${escHtml(o.name)}</span>
              <span class="badge">#${idx+1}</span>
            </div>
            <div class="row">
              <label>Nama</label>
              <input value="${escHtml(o.name)}" onchange="updateField(${idx},'name',this.value)" placeholder="Nama overlay">
              <label>URL</label>
              <input value="${escHtml(o.url || '')}" onchange="updateField(${idx},'url',this.value)" placeholder="https://...">
              <label>Teks</label>
              <input value="${escHtml(o.text || '')}" onchange="updateField(${idx},'text',this.value)" placeholder="Teks kustom">
            </div>
            <div class="row">
              <label>X</label>
              <input type="number" value="${o.x || 0}" onchange="updateField(${idx},'x',parseFloat(this.value)||0)">
              <label>Y</label>
              <input type="number" value="${o.y || 0}" onchange="updateField(${idx},'y',parseFloat(this.value)||0)">
              <label>Width</label>
              <input value="${o.width || '100%'}" onchange="updateField(${idx},'width',this.value)">
              <label>Height</label>
              <input value="${o.height || '100%'}" onchange="updateField(${idx},'height',this.value)">
            </div>
            <div class="row">
              <label>Z-Index</label>
              <input type="number" value="${o.zIndex || 1}" onchange="updateField(${idx},'zIndex',parseInt(this.value)||1)">
              <label>Opacity</label>
              <input type="number" step="0.05" min="0" max="1" value="${o.opacity || 1}" onchange="updateField(${idx},'opacity',parseFloat(this.value)||1)">
              <label>Rasio</label>
              <select onchange="applyAspect(${idx},this.value)">
                <option value="custom" ${!o.aspect || o.aspect==='custom'?'selected':''}>Custom</option>
                <option value="16:9" ${o.aspect==='16:9'?'selected':''}>16:9</option>
                <option value="9:16" ${o.aspect==='9:16'?'selected':''}>9:16</option>
              </select>
              <button class="btn btn-danger btn-sm" onclick="removeOverlay(${idx})">🗑️</button>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function updateField(idx, field, value) {
      if (overlays[idx]) {
        overlays[idx][field] = value;
        updateURL();
        saveLocal();
        render(); // refresh untuk update tampilan
      }
    }

    function applyAspect(idx, ratio) {
      if (!overlays[idx]) return;
      const o = overlays[idx];
      o.aspect = ratio;
      // Hitung ulang width/height berdasarkan rasio
      let w = parseFloat(o.width) || 1920;
      let h = parseFloat(o.height) || 1080;
      if (typeof o.width === 'string' && o.width.includes('%')) {
        w = 1920 * parseFloat(o.width) / 100;
      }
      if (typeof o.height === 'string' && o.height.includes('%')) {
        h = 1080 * parseFloat(o.height) / 100;
      }
      let ref = w || 1920;
      let newW, newH;
      if (ratio === '16:9') {
        newW = ref;
        newH = ref * 9 / 16;
      } else if (ratio === '9:16') {
        newW = ref;
        newH = ref * 16 / 9;
      } else {
        return;
      }
      o.width = Math.round(newW) + 'px';
      o.height = Math.round(newH) + 'px';
      updateURL();
      saveLocal();
      render();
      showToast('✅ Rasio ' + ratio + ' diterapkan untuk ' + o.name);
    }

    function removeOverlay(idx) {
      if (confirm('Hapus overlay "' + overlays[idx].name + '"?')) {
        overlays.splice(idx, 1);
        updateURL();
        saveLocal();
        render();
        showToast('🗑️ Overlay dihapus');
      }
    }

    function addOverlay() {
      const name = document.getElementById('new-name').value.trim() || 'Overlay ' + (overlays.length+1);
      const url = document.getElementById('new-url').value.trim();
      const text = document.getElementById('new-text').value.trim();
      if (!url && !text) {
        showToast('⚠️ Isi URL atau Teks minimal satu!', 'error');
        return;
      }
      overlays.push({
        name: name,
        url: url,
        text: text,
        x: 0,
        y: 0,
        width: '100%',
        height: '100%',
        zIndex: overlays.length + 20,
        opacity: 1,
        aspect: 'custom'
      });
      document.getElementById('new-url').value = '';
      document.getElementById('new-text').value = '';
      updateURL();
      saveLocal();
      render();
      showToast('✅ Overlay "' + name + '" ditambahkan!');
    }

    // ─── URL ENCODE ────────────────────────────────────────────
    function updateURL() {
      const json = JSON.stringify(overlays);
      const encoded = btoa(encodeURIComponent(json));
      const url = window.location.origin + window.location.pathname + '?data=' + encoded;
      document.getElementById('share-url').textContent = url;
      // Simpan di localStorage juga
      localStorage.setItem('oa_remote_overlays', json);
      // Update URL bar tanpa reload (history)
      try {
        window.history.replaceState({}, '', '?data=' + encoded);
      } catch(e) {}
    }

    function saveLocal() {
      localStorage.setItem('oa_remote_overlays', JSON.stringify(overlays));
    }

    // ─── TOMBOL ACTION ─────────────────────────────────────────
    function applyToDisplay() {
      const url = document.getElementById('share-url').textContent;
      navigator.clipboard.writeText(url).then(() => {
        showToast('📋 URL dicopy! Paste di OBS Browser Source URL (atau Local File -> URL)');
      }).catch(() => {
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = url;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('📋 URL dicopy!');
      });
    }

    function openInNewTab() {
      const url = document.getElementById('share-url').textContent;
      window.open(url, '_blank');
    }

    function resetAll() {
      if (confirm('Reset semua overlay ke default?')) {
        overlays = [
          { name: 'Sociabuzz Alert', url: 'https://sociabuzz.com/pro/tribe/alert1/v3/7264966058?colorName=%2300ff00&alphaName=1&colorNote=%23ffff00&alphaNote=1&colorFrom=%23eeeeee&alphaFrom=1&gifActive=1&maxDuration=25&font=Open%2BSans%3A800', text: '', x: 0, y: 0, width: '100%', height: '100%', zIndex: 10, opacity: 1 },
          { name: 'Sociabuzz Top Leaderboard', url: 'https://sociabuzz.com/pro/tribe/topleaderboard/v2/7264966058', text: '', x: 0, y: 0, width: '100%', height: '100%', zIndex: 12, opacity: 1 },
          { name: 'Sociabuzz Subathon', url: 'https://sociabuzz.com/pro/tribe/timer/v2/7264966058', text: '', x: 0, y: 600, width: '100%', height: '100%', zIndex: 13, opacity: 1 },
        ];
        updateURL();
        saveLocal();
        render();
        showToast('🔄 Reset ke default');
      }
    }

    function sendToDisplayTab() {
      // Kirim data ke tab display via BroadcastChannel
      try {
        const channel = new BroadcastChannel('oa_remote_channel');
        channel.postMessage({ type: 'UPDATE', data: overlays });
        showToast('📡 Data dikirim ke tab display!');
      } catch(e) {
        showToast('❌ Gagal kirim broadcast. Copy URL saja.', 'error');
      }
    }

    function exportConfig() {
      const json = JSON.stringify(overlays, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'overlay_config_' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
      showToast('📥 Config diexport!');
    }

    function importConfig(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (Array.isArray(data)) {
            overlays = data;
            updateURL();
            saveLocal();
            render();
            showToast('📤 Config diimport! ' + overlays.length + ' overlay');
          } else {
            showToast('❌ File tidak valid (bukan array)', 'error');
          }
        } catch(err) {
          showToast('❌ Gagal parse file JSON', 'error');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // ─── TOAST ──────────────────────────────────────────────────
    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast' + (type === 'error' ? ' error' : '');
      el.style.display = 'block';
      clearTimeout(el._hide);
      el._hide = setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    // ─── BOOT ──────────────────────────────────────────────────
    loadFromURL();
  </script>
</body>
</html>
